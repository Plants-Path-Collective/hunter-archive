<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Hunter Generator</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="window">
    <div class="title-bar">
        <span>Hunter Searcher</span>
        <div class="window-controls">
            <button onclick="minimizeWindow(this.closest('.window'))">_</button>
            <button onclick="goHome()">X</button>
        </div>
    </div>
    
    <div class="content">

        <div class="panel">

            <h3>Parámetros base</h3>

            <label>Género</label>
            <select id="gender"></select>

            <label>Clase</label>
            <select id="class"></select>

            <label>MBTI</label>
            <select id="mbti"></select>

            <button id="generate">Generar Hunter</button>

        </div>

    </div>
</div>

<!-- TASKBAR -->
<div id="taskbar">
    <span class="item">Hunter OS v1.1</span>
    <span id="clock" class="item"></span>
</div>

<script src="js/script.js"></script>
<script src="js/generator.js"></script>
</body>
</html>
