<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Hunter Association OS v1.2.1</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div id="desktop">

    <!-- ICONOS -->
    <button class="icon" onclick="openApp('generator')">
        <img src="https://i.imgur.com/kUxi2AZ.png" class="icon-img">
        <span class="icon-label">Buscador</span>
    </button>

    <button class="icon" onclick="openApp('files')">
        <img src="https://i.imgur.com/0BDLWir.png" class="icon-img">
        <span class="icon-label">Archivos</span>
    </button>

    <button class="icon" onclick="openApp('editor')">
        <img src="https://i.imgur.com/5vjXlj2.png" class="icon-img">
        <span class="icon-label">Editor</span>
    </button>

    <button class="icon" onclick="openApp('mail')">
        <img src="https://i.imgur.com/vC1FJdm.png" class="icon-img">
        <span class="icon-label">Mail</span>
    </button>

</div>

<!-- VENTANAS -->
<div id="windows"></div>

<!-- TASKBAR -->
<div id="taskbar">
    <span id="clock"></span>
</div>

<script src="js/os.js"></script>
<script src="js/apps.js"></script>
</body>
</html>
