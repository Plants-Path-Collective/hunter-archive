<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Hunter Association OS</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div id="desktop">

    

    <!-- ICONOS -->
    <button class="icon" onclick="openGenerator()">
        <img class="icon-img" src="https://i.imgur.com/YOUR_ICON.png">
        <span class="icon-label">Generator</span>
    </button>

    <button class="icon" onclick="openMail()">
        <img class="icon-img" src="https://i.imgur.com/YOUR_ICON2.png">
        <span class="icon-label">Inbox</span>
    </button>

    <!-- VENTANA -->
    <div class="window" id="viewer-window">

        <div class="title-bar">
            <span>Hunter Archive</span>
            <div class="window-controls">
                <button onclick="minimizeWindow(this.closest('.window'))">_</button>
                <button onclick="goHome()">X</button>
            </div>
        </div>

        <!-- TABS -->
        <div class="tabs" id="tabs"></div>

        <div class="content two-column">

            <div id="viewer-list"></div>

            <div id="viewer-detail">
                <p>Seleccione un expediente.</p>
            </div>

        </div>

    </div>

</div>

<!-- TASKBAR -->
<div id="taskbar">
    <span class="item">Hunter OS v1.1</span>
    <span id="clock" class="item"></span>
</div>

<script src="js/script.js"></script>
<script src="js/viewer.js"></script>

</body>
</html>
