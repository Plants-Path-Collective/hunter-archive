<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Hunter Editor</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="window">

    <div class="title-bar">
        <div class="window-controls">
            <button onclick="minimizeWindow(this.closest('.window'))">_</button>
            <button onclick="goHome()">X</button>
        </div>

        <span class="title-text">Hunter Sheet</span>
    </div>
    
    <!-- TABS -->
    <div class="tabs" id="tabs"></div>

    <div class="content two-column">

        <!-- EDITOR -->
        <div class="panel">

            <div id="base"></div>

            <h3>Edición</h3>

            <label>Imagen (Imgur)</label>
            <input id="image">

            <label>Descripción</label>
            <textarea id="desc"></textarea>

            <label>Pasiva</label>
            <input id="passive">

            <label>Activa</label>
            <input id="active">

            <button id="update">Actualizar</button>
            <button id="download">Descargar</button>

        </div>

        <!-- PREVIEW -->
        <div class="panel">
            <h3>Preview</h3>
            <div id="preview"></div>
        </div>

    </div>

</div>

<!-- TASKBAR -->
<div id="taskbar">
    <span class="item">Hunter OS v1.1</span>
    <span id="clock" class="item"></span>
</div>

<script src="js/script.js"></script>
<script src="js/editor.js"></script>
</body>
</html>
